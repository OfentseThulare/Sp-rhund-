<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Spürhund - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&amp;family=Manrope:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#7d7386",
              "on-surface": "#1a1c1c",
              "surface-dim": "#dadada",
              "on-tertiary-fixed-variant": "#474646",
              "on-secondary-fixed": "#151c27",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "secondary-fixed": "#dce2f3",
              "primary-fixed-dim": "#dab9ff",
              "primary-fixed": "#efdbff",
              "primary": "#6900bf",
              "surface-container-low": "#f3f3f3",
              "on-primary-fixed": "#2a0053",
              "inverse-surface": "#2f3131",
              "on-tertiary-fixed": "#1c1b1b",
              "primary-container": "#8529e2",
              "outline-variant": "#cfc2d7",
              "surface-variant": "#e2e2e2",
              "on-primary-fixed-variant": "#6500b8",
              "surface-bright": "#f9f9f9",
              "surface-container-high": "#e8e8e8",
              "surface-container": "#eeeeee",
              "tertiary-fixed": "#e5e2e1",
              "on-background": "#1a1c1c",
              "on-secondary-container": "#5e6572",
              "surface-tint": "#8224df",
              "on-tertiary": "#ffffff",
              "secondary-container": "#dce2f3",
              "on-primary": "#ffffff",
              "tertiary": "#4a4949",
              "secondary": "#585f6c",
              "tertiary-container": "#626161",
              "surface": "#f9f9f9",
              "on-tertiary-container": "#dfdcdc",
              "on-secondary": "#ffffff",
              "surface-container-highest": "#e2e2e2",
              "background": "#f9f9f9",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#404754",
              "inverse-on-surface": "#f0f1f1",
              "secondary-fixed-dim": "#c0c7d6",
              "on-error-container": "#93000a",
              "on-surface-variant": "#4c4355",
              "on-primary-container": "#ebd5ff",
              "tertiary-fixed-dim": "#c8c6c5",
              "error": "#ba1a1a",
              "inverse-primary": "#dab9ff"
            },
            fontFamily: {
              "headline": ["Epilogue"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-island {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }
        .tight-tracking {
            letter-spacing: -0.04em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bright font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Suppressed Shell Logic: Navigation is hidden for transactional login flow -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md space-y-12">
<!-- Logo/Heading Section -->
<header class="text-center space-y-4">
<div class="inline-flex items-center justify-center p-4 bg-surface-container-lowest rounded-full shadow-[0_24px_48px_rgba(17,17,17,0.06)]">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="pets" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<h1 class="font-headline text-4xl font-extrabold text-on-background tight-tracking">Sign In</h1>
<p class="text-secondary font-medium body-lg">Welcome back to Spürhund editorial.</p>
</header>
<!-- Main Form Card -->
<section class="bg-surface-container-lowest rounded-xl p-1 md:p-2 shadow-[0_32px_64px_rgba(17,17,17,0.04)]">
<div class="bg-surface-container-low rounded-lg p-8 space-y-6">
<!-- Email Input -->
<div class="relative group">
<label class="absolute left-6 top-3 text-[10px] uppercase tracking-wider font-bold text-secondary transition-all group-focus-within:text-primary-container" for="email">Email Address</label>
<input class="w-full pt-8 pb-3 px-6 bg-surface-container-lowest border-none rounded-full font-medium text-on-surface focus:ring-2 focus:ring-primary-container/20 transition-all placeholder:text-surface-dim" id="email" placeholder="hello@spuerhund.app" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="relative group">
<label class="absolute left-6 top-3 text-[10px] uppercase tracking-wider font-bold text-secondary transition-all group-focus-within:text-primary-container" for="password">Password</label>
<input class="w-full pt-8 pb-3 px-6 bg-surface-container-lowest border-none rounded-full font-medium text-on-surface focus:ring-2 focus:ring-primary-container/20 transition-all placeholder:text-surface-dim" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-6 top-1/2 -translate-y-1/2 mt-2 text-secondary hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end px-2">
<a class="text-sm font-semibold text-primary-container hover:opacity-80 transition-opacity" href="#">Forgot password?</a>
</div>
</div>
<!-- Sign In Action -->
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-full shadow-[0_12px_24px_rgba(133,41,226,0.25)] hover:scale-[1.02] active:scale-95 transition-all duration-300">
                        Sign In
                    </button>
</div>
</section>
<!-- Divider -->
<div class="flex items-center gap-4 px-4">
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
<span class="text-xs font-bold uppercase tracking-widest text-secondary">or continue with</span>
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
</div>
<!-- Social Logins -->
<section class="space-y-4">
<button class="w-full py-4 flex items-center justify-center gap-3 bg-surface-container-lowest text-on-surface font-semibold rounded-full border border-outline-variant/15 hover:bg-surface-container-low transition-all duration-300">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 1.2-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="w-full py-4 flex items-center justify-center gap-3 bg-on-surface text-surface-container-lowest font-semibold rounded-full hover:opacity-90 transition-all duration-300">
<span class="material-symbols-outlined text-xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
                    Apple
                </button>
</section>
<!-- Footer -->
<footer class="text-center pt-4">
<p class="text-secondary font-medium">
                    Don't have an account? 
                    <a class="text-primary-container font-bold ml-1 hover:underline underline-offset-4 transition-all" href="#">Sign up</a>
</p>
</footer>
</div>
</main>
<!-- Decoration Layer (Ethereal Depth) -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-container/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[40%] h-[40%] bg-secondary-container/10 rounded-full blur-[100px] -z-10"></div>
</body></html>
