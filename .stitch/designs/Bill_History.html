<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F9F9F9;
            font-family: 'Manrope', sans-serif;
            color: #111111;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-3xl rounded-full mt-4 mx-4 shadow-[0_24px_48px_rgba(17,17,17,0.06)]">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50">menu</span>
</button>
<h1 class="font-['Epilogue'] tracking-tight font-bold text-slate-900 dark:text-slate-50 text-lg">Bill History</h1>
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50">filter_list</span>
</button>
</header>
<main class="pt-28 px-6 space-y-8">
<!-- Year Selection (Horizontal Chips) -->
<section class="flex overflow-x-auto gap-3 pb-2 no-scrollbar">
<button class="flex-none px-8 py-3 bg-primary-container text-on-primary rounded-full font-label font-bold text-sm shadow-lg shadow-primary-container/20 active:scale-95 duration-200">
                2024
            </button>
<button class="flex-none px-8 py-3 bg-surface-container-lowest text-on-surface-variant rounded-full font-label font-bold text-sm outline outline-1 outline-outline-variant/15 hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
                2023
            </button>
<button class="flex-none px-8 py-3 bg-surface-container-lowest text-on-surface-variant rounded-full font-label font-bold text-sm outline outline-1 outline-outline-variant/15 hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
                2022
            </button>
</section>
<!-- Bill History List -->
<section class="space-y-6">
<!-- October 2024 Card -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_24px_48px_rgba(17,17,17,0.04)]">
<div class="bg-surface-container-low rounded-lg p-6 space-y-6">
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="font-headline font-bold text-xl tracking-tight text-on-surface">October 2024</h3>
<p class="text-secondary text-sm font-medium">01 Oct - 31 Oct</p>
</div>
<div class="text-right space-y-2">
<p class="text-primary-container font-headline font-bold text-lg">R 2,450.00</p>
<span class="inline-flex items-center px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-bold uppercase tracking-wider">
                                Paid
                            </span>
</div>
</div>
<div class="pt-4 border-t border-white/50">
<button class="flex items-center gap-2 text-primary text-sm font-bold font-label hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-sm">description</span>
                            Download PDF
                        </button>
</div>
</div>
</div>
<!-- September 2024 Card -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_24px_48px_rgba(17,17,17,0.04)]">
<div class="bg-surface-container-low rounded-lg p-6 space-y-6">
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="font-headline font-bold text-xl tracking-tight text-on-surface">September 2024</h3>
<p class="text-secondary text-sm font-medium">01 Sep - 30 Sep</p>
</div>
<div class="text-right space-y-2">
<p class="text-primary-container font-headline font-bold text-lg">R 2,120.50</p>
<span class="inline-flex items-center px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-bold uppercase tracking-wider">
                                Paid
                            </span>
</div>
</div>
<div class="pt-4 border-t border-white/50">
<button class="flex items-center gap-2 text-primary text-sm font-bold font-label hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-sm">description</span>
                            Download PDF
                        </button>
</div>
</div>
</div>
<!-- August 2024 Card -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_24px_48px_rgba(17,17,17,0.04)]">

<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="font-headline font-bold text-xl tracking-tight text-on-surface">August 2024</h3>
<p class="text-secondary text-sm font-medium">01 Aug - 31 Aug</p>
</div>
<div class="text-right space-y-2">
<p class="text-primary-container font-headline font-bold text-lg">R 2,890.00</p>
<span class="inline-flex items-center px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-bold uppercase tracking-wider">
                                Paid
                            </span>
</div>
</div>
<div class="pt-4 border-t border-white/50">
<button class="flex items-center gap-2 text-primary text-sm font-bold font-label hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-sm">description</span>
                            Download PDF
                        </button>
</div>
</div>
</div>
</section>
<!-- Insights Bento Moment -->
<section class="grid grid-cols-2 gap-4">
<div class="col-span-2 bg-surface-container-lowest p-6 rounded-xl shadow-[0_24px_48px_rgba(17,17,17,0.04)]">
<h4 class="font-headline font-bold text-on-surface mb-4">Total Spending YTD</h4>
<div class="flex items-end justify-between">
<span class="text-3xl font-headline font-extrabold tracking-tighter text-on-surface">R 18,450.50</span>
<span class="text-emerald-600 font-bold text-sm bg-emerald-50 px-2 py-1 rounded-full">+12% vs 2023</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-3xl rounded-full mb-6 mx-8 shadow-[0_24px_48px_rgba(17,17,17,0.06)]">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 w-12 h-12 hover:text-[#8529E2] dark:hover:text-[#A855F7] transition-colors active:scale-90 duration-200">

<span class="font-['Manrope'] text-[10px] tracking-wider uppercase font-bold mt-1">Home</span>
