<!DOCTYPE html>

<html lang="en"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "label": ["Manrope"]

        },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9f9;
            font-family: 'Manrope', sans-serif;
            color: #1a1c1c;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-3xl flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200 text-zinc-500">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-['Epilogue'] tracking-tighter font-bold text-xl text-zinc-900 dark:text-zinc-50">Directory</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200 text-[#8529E2]">
<span class="material-symbols-outlined">search</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Filter Bar -->
<section class="mb-10 overflow-x-auto hide-scrollbar flex gap-3 -mx-6 px-6">
<button class="flex-none px-6 py-2.5 bg-primary-container text-on-primary rounded-full font-label text-sm font-semibold tracking-wide shadow-sm">
                All
            </button>
<button class="flex-none px-6 py-2.5 bg-surface-container-lowest border border-outline-variant/15 text-secondary rounded-full font-label text-sm font-medium tracking-wide hover:bg-surface-container-low transition-colors">
                Emergency
            </button>
<button class="flex-none px-6 py-2.5 bg-surface-container-lowest border border-outline-variant/15 text-secondary rounded-full font-label text-sm font-medium tracking-wide hover:bg-surface-container-low transition-colors">
                Billing
            </button>
<button class="flex-none px-6 py-2.5 bg-surface-container-lowest border border-outline-variant/15 text-secondary rounded-full font-label text-sm font-medium tracking-wide hover:bg-surface-container-low transition-colors">
                Maintenance
            </button>
</section>
<!-- Contact Cards List -->
<div class="space-y-4">
<!-- Card 1: Emergency -->
<div class="bg-surface-container-lowest rounded-DEFAULT p-4 flex items-center justify-between shadow-[0_4px_24px_rgba(17,17,17,0.04)] hover:shadow-[0_8px_32px_rgba(17,17,17,0.08)] transition-all group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-error">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div>
<h3 class="font-headline font-bold text-[#111111] leading-tight tracking-tight">Water &amp; Sanitation Emergency</h3>
<p class="font-body text-sm text-secondary mt-0.5">0800 222 333</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary-container group-hover:bg-primary-container group-hover:text-white transition-all">
<span class="material-symbols-outlined text-xl">call</span>
</button>
</div>
<!-- Card 2: Billing -->
<div class="bg-surface-container-lowest rounded-DEFAULT p-4 flex items-center justify-between shadow-[0_4px_24px_rgba(17,17,17,0.04)] hover:shadow-[0_8px_32px_rgba(17,17,17,0.08)] transition-all group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
</div>
<div>
<h3 class="font-headline font-bold text-[#111111] leading-tight tracking-tight">Billing Enquiries</h3>
<p class="font-body text-sm text-secondary mt-0.5">0800 555 101</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary-container group-hover:bg-primary-container group-hover:text-white transition-all">
<span class="material-symbols-outlined text-xl">call</span>
</button>
</div>
<!-- Card 3: Power -->
<div class="bg-surface-container-lowest rounded-DEFAULT p-4 flex items-center justify-between shadow-[0_4px_24px_rgba(17,17,17,0.04)] hover:shadow-[0_8px_32px_rgba(17,17,17,0.08)] transition-all group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-amber-500">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<div>
<h3 class="font-headline font-bold text-[#111111] leading-tight tracking-tight">Power Outage &amp; Faults</h3>
<p class="font-body text-sm text-secondary mt-0.5">0800 444 999</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary-container group-hover:bg-primary-container group-hover:text-white transition-all">
<span class="material-symbols-outlined text-xl">call</span>
</button>
</div>
<!-- Card 4: Maintenance -->
<div class="bg-surface-container-lowest rounded-DEFAULT p-4 flex items-center justify-between shadow-[0_4px_24px_rgba(17,17,17,0.04)] hover:shadow-[0_8px_32px_rgba(17,17,17,0.08)] transition-all group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">construction</span>
</div>
<div>
<h3 class="font-headline font-bold text-[#111111] leading-tight tracking-tight">General Maintenance</h3>
<p class="font-body text-sm text-secondary mt-0.5">0800 111 222</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary-container group-hover:bg-primary-container group-hover:text-white transition-all">
<span class="material-symbols-outlined text-xl">call</span>
</button>
</div>
<!-- Card 5: Waste -->
<div class="bg-surface-container-lowest rounded-DEFAULT p-4 flex items-center justify-between shadow-[0_4px_24px_rgba(17,17,17,0.04)] hover:shadow-[0_8px_32px_rgba(17,17,17,0.08)] transition-all group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-emerald-600">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">delete_outline</span>
</div>
<div>
<h3 class="font-headline font-bold text-[#111111] leading-tight tracking-tight">Refuse Collection</h3>
<p class="font-body text-sm text-secondary mt-0.5">0800 777 888</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary-container group-hover:bg-primary-container group-hover:text-white transition-all">
<span class="material-symbols-outlined text-xl">call</span>
</button>
</div>
</div>
</main>

<nav class="fixed bottom-8 left-0 right-0 z-50 flex justify-around items-center px-4 py-3 bg-white/70 dark:bg-zinc-900/70 backdrop-blur-[30px] w-[90%] max-w-md mx-auto rounded-full shadow-[0_24px_48px_rgba(17,17,17,0.06)]">
<button class="flex items-center justify-center text-zinc-500 p-3 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full transition-all">
<span class="material-symbols-outlined">home</span>
</button>
<button class="flex items-center justify-center text-zinc-500 p-3 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full transition-all">
<span class="material-symbols-outlined">explore</span>
</button>
<button class="flex items-center justify-center text-zinc-500 p-3 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full transition-all">
<span class="material-symbols-outlined">analytics</span>
</button>
<button class="flex items-center justify-center text-zinc-500 p-3 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full transition-all">
<span class="material-symbols-outlined">hub</span>
</button>
<button class="flex items-center justify-center bg-[#8529E2] text-white rounded-full p-3 active:scale-90 transition-transform duration-300">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</nav>
